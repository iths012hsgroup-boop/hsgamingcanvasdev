<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Cocos Creator | hsgamingcanvas2</title>
  <meta name="viewport" content="width=device-width,user-scalable=no,initial-scale=1,minimum-scale=1,maximum-scale=1,minimal-ui=true"/>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=no">
  <meta name="renderer" content="webkit"/>
  <meta name="force-rendering" content="webkit"/>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1"/>
  <meta name="msapplication-tap-highlight" content="no">
  <meta name="full-screen" content="yes"/>
  <meta name="x5-fullscreen" content="true"/>
  <meta name="360-fullscreen" content="true"/>
  <meta name="x5-page-mode" content="app">
  <link rel="stylesheet" type="text/css" href="style.css"/>

  <style>
    /* Sembunyikan Logo Loading Asli dari Cocos */
    #splash { display: none !important; opacity: 0 !important; visibility: hidden !important; }

    /* Bar Emas Kita */
    #custom-progress-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; background: transparent; 
      display: flex; flex-direction: column; justify-content: flex-end; align-items: center;
      padding-bottom: 50px; z-index: 99999;
      transition: opacity 0.5s ease; /* Efek memudar saat menghilang */
    }
    .progress-bar-container {
      background-color: rgba(0, 0, 0, 0.6); width: 60%; height: 20px; border-radius: 10px; overflow: hidden;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.8), inset 0 0 5px rgba(0,0,0,0.5); margin-bottom: 10px; 
    }
    .progress-bar-fill {
      display: block; height: 100%; width: 0%; border-radius: 10px;
      background: linear-gradient(90deg, #B8860B, #FFD700, #FFF8DC); 
      transition: width 0.2s ease-out; box-shadow: 0 0 15px rgba(255, 215, 0, 0.8); 
    }
    #loading-text {
      color: #FFD700; font-size: 20px; font-weight: bold; font-family: Arial, sans-serif;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.9); 
    }
  </style>
</head>
<body>
  <div id="GameDiv" cc_exact_fit_screen="true">
      <div id="Cocos3dGameContainer">
        <canvas id="GameCanvas" oncontextmenu="event.preventDefault()" tabindex="99"></canvas>
      </div>
  </div>

  <div id="custom-progress-overlay">
    <div class="progress-bar-container"><span class="progress-bar-fill" id="custom-progress"></span></div>
    <div id="loading-text">0%</div>
  </div>

<!-- Polyfills & SystemJS -->
<script src="src/polyfills.bundle.js" charset="utf-8"> </script>
<script src="src/system.bundle.js" charset="utf-8"> </script>
<script src="src/import-map.json" type="systemjs-importmap" charset="utf-8"> </script>
<script>
    System.import('./index.js').catch(function(err) { console.error(err); });
    
    // --- SKRIP ANIMASI LOADING FINAL & PALING SEMPURNA ---
    var customBar = document.getElementById('custom-progress');
    var customText = document.getElementById('loading-text');
    var overlay = document.getElementById('custom-progress-overlay');

    var progress = 0;
    
    // 1. Animasi bar merambat pelan dan aman menuju 99%
    var loadingTimer = setInterval(function() {
        if (progress < 99) {
            // Berjalan melambat otomatis, sangat cocok untuk game dengan ukuran besar/loading 21 detik
            progress += (99 - progress) * 0.05; 
            var displayPercent = Math.floor(progress);
            if (customBar && customText) {
                customBar.style.width = displayPercent + '%';
                customText.innerText = displayPercent + '%';
            }
        }
    }, 100);

    // 2. Deteksi Akurat Menggunakan Jalur Utama Engine Cocos
    var checkReady = setInterval(function() {
        if (window.cc && cc.director) {
            clearInterval(checkReady); // Engine Cocos Ditemukan!
            
            // EVENT Ini Adalah "Gong"-nya. 
            // Dipanggil SANGAT AKURAT tepat di milidetik saat Scene Game Muncul di layar.
            cc.director.on(cc.Director.EVENT_AFTER_SCENE_LAUNCH, function () { 
                
                // Segera hentikan animasi menunggunya
                clearInterval(loadingTimer);
                
                // Tancap penuh ke 100%
                if (customBar && customText) {
                    customBar.style.width = '100%';
                    customText.innerText = '100%';
                }
                
                // Lenyapkan Bar Emas SECARA BERSAMAAN ketika Game Utama Tampil
                if (overlay) {
                    overlay.style.opacity = '0'; // Pudar Transisi 0.5 detik
                    setTimeout(function() { 
                        overlay.style.display = 'none'; // Musnah seutuhnya
                    }, 500); 
                }
            });
        }
    }, 200);

    // JIKA ADA ERROR PARAH: Hilangkan bar jika diklik (fitur darurat tersembunyi)
    if(overlay) {
        overlay.onclick = function() {
            clearInterval(loadingTimer);
            overlay.style.display = 'none';
        }
    }
</script>
</body>
</html>
